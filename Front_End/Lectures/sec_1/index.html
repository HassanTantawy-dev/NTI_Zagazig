<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <!-- bootstrap css-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <!-- style css -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="container-fluid">
    <h1 class="item">Hello World</h1>
    <h2>Welcome to our website</h2>
    <h2>Welcome to our website</h2>
    <h2>Welcome to our website</h2>
    <h2>Welcome to our website</h2>
    <hr class="w-50 ">
    <a href="https://www.google.com" target="_blank"><img src="img/backiee-124412-landscape.jpg" alt="" width="500px" class="img-fluid"
            height="200px"></a>
    <hr class="w-50 ">
    <table border="" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ahmed</td>
                <td>ahmed@gmail.com</td>
                <td>30</td>
            </tr>
            <tr>
                <td>Hassan</td>
                <td>hassan@gmail.com</td>
                <td>35</td>
            </tr>
        </tbody>
    </table>
    <hr class="w-50 ">
    <form action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" class="form-control w-25 ml-4" placeholder="Enter your name">
        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" class="form-control w-25 ml-4" placeholder="Enter your email">
        <br>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" class="form-control w-25 ml-4" placeholder="Enter your password">
        <br>
        <br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" class="form-control w-25 ml-4" placeholder="Enter your age">
        <br>
        <br>
        <textarea name="message" class="form-control w-25"></textarea>
        <br>
        <br>
        <input type="color" class="form-control w-25 ml-4">
        <br>
        <br>
        <input type="date" class="form-control w-25 ml-4">
        <br>
        <br>
        <input type="checkbox" name="" id="html">
        <label for="html" class="mr-3">Html</label>
        <input type="checkbox" name="" id="css">
        <label for="css" class="mr-3">Css</label>
        <input type="checkbox" name="" id="js">
        <label for="js" class="mr-3">Js</label>
        <br>
        <br>

        <input type="submit" value="Submit" class="btn btn-primary w-25 ml-4">
        <input type="reset" value="Reset" class="btn btn-danger w-25 ml-4">
        <br>
        <br>    
    </form>


</body>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"

    crossorigin="anonymous"></script>

</html>
